version: "2"

linters:
  default: none
  enable:
    - errcheck
    - gosec
    - gocritic
    - govet
    - ineffassign
    - staticcheck
    - unused

  settings:
    gosec:
      excludes:
        - G115
    gocritic:
      enabled-tags:
        - diagnostic

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
      - path: internal/core/database/
        linters:
          - gosec
      - path: internal/core/metadata/
        linters:
          - gosec

formatters:
  enable:
    - gofmt

run:
  timeout: 5m
  tests: true
