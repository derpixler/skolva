openapi: 3.1.0
info:
  title: Skolva API
  version: 0.2.0
  description: >
    Skolva — self-hosted community management platform.
    Phase 2: Identity (auth, users, roles, permissions).
servers:
  - url: /api
    description: API root
paths:
  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        "200":
          description: Service healthy
        "503":
          description: Service unhealthy
  /users/{id}/roles:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      summary: List a user's roles
      operationId: listUserRoles
      responses:
        "200":
          description: The user's roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    post:
      summary: Assign a role to a user
      operationId: assignRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignRoleRequest"
      responses:
        "200":
          description: The user's updated roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /users/{id}/roles/{slug}:
    parameters:
      - $ref: "#/components/parameters/UserId"
      - name: slug
        in: path
        required: true
        schema:
          type: string
    delete:
      summary: Remove a role from a user
      operationId: removeRole
      responses:
        "204":
          description: Role removed
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /groups:
    get:
      summary: List groups
      operationId: listGroups
      parameters:
        - name: group_type
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
    post:
      summary: Create a group
      operationId: createGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupRequest"
      responses:
        "201":
          description: Created group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /groups/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a group
      operationId: getGroup
      responses:
        "200":
          description: Group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      summary: Update a group
      operationId: updateGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGroupRequest"
      responses:
        "200":
          description: Updated group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete a group
      operationId: deleteGroup
      responses:
        "204":
          description: Group deleted
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
components:
  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    Role:
      type: object
      properties:
        slug:
          type: string
        display_name:
          type: string
        is_protected:
          type: boolean
    AssignRoleRequest:
      type: object
      required:
        - role_slug
      properties:
        role_slug:
          type: string
    Group:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        group_type:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateGroupRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        group_type:
          type: string
    UpdateGroupRequest:
      type: object
      required:
        - name
        - group_type
      properties:
        name:
          type: string
        description:
          type: string
        group_type:
          type: string
        is_active:
          type: boolean
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
